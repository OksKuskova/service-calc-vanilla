<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Калькулятор услугов</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/styles/index.css">
	<script type="module" src="/js/index.js"></script>
</head>

<body>
	<div class="calc" data-js-calc>
		<div class="calc__overlay overlay overlay--hidden" data-js-overlay>
			<span class="overlay__text" data-js-overlay-text>Загрузка...</span>
		</div>

		<form class="calc__form" id="order" data-js-form novalidate>
			<div class="calc__field">
				<label class="calc__label" for="material">Материал</label>
				<div class="calc__select-wrapper" data-js-select-wrapper>
					<select class="calc__select form-element" name="materal" id="material" required data-js-select></select>
				</div>
			</div>
			<div class="calc__field">
				<label class="calc__label" for="quantity">Количество</label>
				<input class="calc__input form-element" type="text" id="quantity" autocomplete="off" required>
			</div>
			<div class="calc__field">
				<label class="calc__label" for="name">Ваше имя</label>
				<input class="calc__input form-element" type="text" id="name" required>
			</div>
		</form>

		<div class="calc__totals">
			<div class="calc__discount summary">
				<span class="summary__label">Скидка (осталось секунд: <span data-js-timer></span>)</span>
				<span class="summary__value"><span data-js-discount></span>%</span>
			</div>

			<div class="calc__summary summary">
				<span class="summary__label">Итоговая стоимость</span>
				<span class="summary__value">12 567 Р</span>
			</div>

			<button class="calc__button form-element form-element--green" type='submit' form="order">Оформить
				заказ</button>
		</div>
	</div>
</body>

</html>
